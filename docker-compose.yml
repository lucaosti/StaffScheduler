services:
  # Database Service
  mysql:
    image: mysql:8.0.42
    container_name: staff_scheduler_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-staff_scheduler}
      MYSQL_USER: ${MYSQL_USER:-scheduler_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in .env}
    # No host port in production: MySQL is reachable only on the internal compose
    # network (the backend and migrate services connect by service name). The dev
    # override republishes 3306 for local tooling; production admin access goes
    # through the phpmyadmin `dev` profile or an explicit, temporary port forward.
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
    # Use MySQL 8's default caching_sha2_password (the legacy
    # mysql_native_password plugin is deprecated and removed in MySQL 9). mysql2
    # (backend) and go-sql-driver (dbmate) both support it over the internal
    # network.
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    networks:
      - staff_scheduler_network
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 40s

  # Redis — shared-state backend for the JTI blacklist, auth-context cache and
  # module cache (see backend/src/config/redis.ts). Present in the compose
  # deployment because that is where horizontal scaling matters; the backend
  # uses it only when REDIS_URL is set (below), so removing this service and
  # the backend's REDIS_URL falls back cleanly to single-instance in-process
  # state. Password-protected: set REDIS_PASSWORD in .env for any real
  # deployment (an empty value runs Redis without auth for local use only).
  redis:
    image: redis:7.4-alpine
    container_name: staff_scheduler_redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD:-}" --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - staff_scheduler_network
    mem_limit: 320m
    cpus: 0.25
    healthcheck:
      # -a is only meaningful when a password is set; redis-cli tolerates an
      # empty -a argument, so this works with or without REDIS_PASSWORD.
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot schema migration runner: applies pending dbmate migrations and
  # exits. The backend only starts after this completes successfully, so the
  # schema is always up to date before the API accepts traffic.
  # Note: MYSQL_USER and MYSQL_PASSWORD are interpolated into DATABASE_URL —
  # characters that are special in URLs (@ / : #) must be percent-encoded in
  # .env if used in the password.
  migrate:
    image: amacneil/dbmate:2
    container_name: staff_scheduler_migrate
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-scheduler_user}:${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in .env}@mysql:3306/${MYSQL_DATABASE:-staff_scheduler}
      DBMATE_NO_DUMP_SCHEMA: "true"
    command: --wait up
    volumes:
      - ./backend/db/migrations:/db/migrations:ro
    networks:
      - staff_scheduler_network

  # Backend API Service
  backend:
    build:
      # Root context: the workspaces lockfile and packages/shared live at the
      # repo root (see backend/Dockerfile for the full rationale).
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: staff_scheduler_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-staff_scheduler}
      DB_USER: ${MYSQL_USER:-scheduler_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in .env}
      # Enables the shared Redis-backed caches. Drop this line (and the redis
      # service) to run single-instance with in-process state.
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DB_POOL_LIMIT: ${DB_POOL_LIMIT:-30}
      DB_QUEUE_LIMIT: ${DB_QUEUE_LIMIT:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - backend_logs:/app/logs
      - backend_reports:/app/reports
      - backend_uploads:/app/uploads
    networks:
      - staff_scheduler_network
    mem_limit: 1g
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
      args:
        # Vite bakes this at build time. Relative default: the frontend nginx
        # proxies /api to the backend, so the SPA works on any host without
        # knowing the backend's address.
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    container_name: staff_scheduler_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - staff_scheduler_network
    mem_limit: 256m
    cpus: 0.25
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Database Management Interface (dev only — start with: docker compose --profile dev up)
  phpmyadmin:
    profiles: ["dev"]
    image: phpmyadmin/phpmyadmin:5.2
    container_name: staff_scheduler_phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-scheduler_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-scheduler_password}
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    networks:
      - staff_scheduler_network

  # ── Scheduled logical backups (opt-in: docker compose --profile backup up) ──
  # A mysqldump sidecar that writes a consistent, retention-pruned gzip dump on
  # an interval. Uses the mysql image only for its client tools. Also joins the
  # `ops` profile so the observability bring-up includes backups.
  backup:
    profiles: ["backup", "ops"]
    image: mysql:8.0.42
    container_name: staff_scheduler_backup
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-staff_scheduler}
      DB_USER: ${MYSQL_USER:-scheduler_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in .env}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    entrypoint: ["/bin/sh", "-c"]
    # Run one backup immediately, then every BACKUP_INTERVAL_SECONDS. A failed
    # run is logged but never kills the loop, so one bad dump doesn't stop the
    # schedule.
    command:
      - |
        while true; do
          /scripts/backup.sh || echo "[backup] run failed";
          sleep "${BACKUP_INTERVAL_SECONDS:-86400}";
        done
    volumes:
      - ./ops/backup:/scripts:ro
      - backup_data:/backups
    networks:
      - staff_scheduler_network
    mem_limit: 256m
    cpus: 0.25

  # ── Observability stack (opt-in: docker compose --profile ops up) ──────────
  # Prometheus scrapes the backend /metrics, Grafana visualises it (and Loki
  # logs), Loki stores logs, Promtail ships the backend's log file to Loki.
  # All on the internal network; only Grafana is published to the host.
  prometheus:
    profiles: ["ops"]
    image: prom/prometheus:v3.1.0
    container_name: staff_scheduler_prometheus
    restart: unless-stopped
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - staff_scheduler_network
    mem_limit: 512m
    cpus: 0.5

  grafana:
    profiles: ["ops"]
    image: grafana/grafana:11.4.0
    container_name: staff_scheduler_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    networks:
      - staff_scheduler_network
    mem_limit: 512m
    cpus: 0.5

  loki:
    profiles: ["ops"]
    image: grafana/loki:3.3.2
    container_name: staff_scheduler_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - staff_scheduler_network
    mem_limit: 512m
    cpus: 0.5

  promtail:
    profiles: ["ops"]
    image: grafana/promtail:3.3.2
    container_name: staff_scheduler_promtail
    restart: unless-stopped
    depends_on:
      - loki
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./ops/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Same volume the backend writes its Winston logs to, mounted read-only.
      - backend_logs:/app/logs:ro
    networks:
      - staff_scheduler_network
    mem_limit: 128m
    cpus: 0.25

# Persistent volumes
volumes:
  mysql_data:
    driver: local
  backend_logs:
    driver: local
  backend_reports:
    driver: local
  backend_uploads:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  backup_data:
    driver: local

# Network configuration
networks:
  staff_scheduler_network:
    driver: bridge
