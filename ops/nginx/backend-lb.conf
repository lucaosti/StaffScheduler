# Load balancer in front of the backend replicas.
#
# Used by the `backend-lb` service in docker-compose.scale.yml so the API is
# reachable on a single host port while N backend replicas serve it.
#
# WHY A VARIABLE proxy_pass: nginx resolves a hostname in a literal proxy_pass
# exactly once, at startup. `backend` resolves to one A record per replica, so a
# cached resolution would pin every request to one replica — and break outright
# when that replica is replaced during a rolling deploy. Resolving through the
# Docker DNS server with a short TTL, via a variable, re-resolves at request time
# and spreads load across whatever replicas currently exist.
server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=5s ipv6=off;

    location / {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events (/api/events) must stream rather than buffer, and
        # must outlive the default 60s read timeout. Safe for normal requests
        # too: responses are small and already streamed by Express.
        proxy_buffering off;
        proxy_read_timeout 1h;

        # During a rolling deploy a replica may go away mid-request; retry the
        # next one instead of surfacing a 502 to the client.
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }
}
