# Grafana datasource provisioning — Prometheus (metrics) and Loki (logs), both
# reachable on the compose network. Auto-loaded on Grafana startup so the ops
# stack needs no manual datasource setup.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
