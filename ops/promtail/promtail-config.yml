# Promtail ships the backend's Winston log file to Loki. It tails the shared
# backend_logs volume (mounted read-only) rather than the Docker socket, so it
# needs no elevated access. Winston writes JSON lines, so the pipeline parses
# them to promote level/requestId into labels for querying in Grafana.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: staff-scheduler-backend
    static_configs:
      - targets: [localhost]
        labels:
          job: staff-scheduler-backend
          __path__: /app/logs/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            requestId: requestId
      - labels:
          level:
