# Prometheus scrape configuration for the StaffScheduler `ops` compose profile.
#
# Prometheus and the backend share the compose network, so the backend's
# /metrics endpoint is reached at http://backend:3001/metrics. The bundled
# profile leaves METRICS_TOKEN unset and relies on that network isolation
# (/metrics is never published to the host). If you set METRICS_TOKEN, add a
# matching `authorization` block below (type: Bearer, credentials_file: ...).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: staff-scheduler-backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:3001']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
