name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same ref to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: read-only access to the repo.
# Individual jobs may opt in to writes if/when they need them.
permissions:
  contents: read

# Opt every job into the Node 24 action runtime (GitHub deprecated Node 20
# for action runtimes; the explicit env makes the runner accept actions
# even after Node 20 is fully removed). The Node version we *use* for our
# code is set per-job via actions/setup-node.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backend:
    name: Backend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Dead-code check (knip)
        run: npm run deadcode

      - name: Type-check and build
        run: npm run build

      - name: Unit tests with coverage gate
        run: npm run test:coverage -- --ci --reporters=default --reporters=github-actions --runInBand --coverageReporters=text-summary --coverageReporters=html --coverageReporters=lcov --coverageReporters=json-summary

      - name: Publish coverage summary to job summary
        if: always()
        run: |
          echo "## Backend coverage" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => \`| \${m.pct.toFixed(2)}% | \${m.covered}/\${m.total} |\`;
              const out = [
                '| Metric | Coverage | Covered/Total |',
                '|---|---|---|',
                \`| Lines      \${fmt(c.lines)}\`,
                \`| Statements \${fmt(c.statements)}\`,
                \`| Functions  \${fmt(c.functions)}\`,
                \`| Branches   \${fmt(c.branches)}\`,
              ].join('\n');
              require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, out + '\n');
            "
          fi

      - name: Upload backend coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 30

  frontend:
    name: Frontend (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Dead-code check (knip)
        run: npm run deadcode

      - name: Type-check (strict unused locals/parameters)
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npm test -- --watchAll=false --ci --coverage --coverageReporters=text-summary --coverageReporters=html --coverageReporters=lcov --coverageReporters=json-summary

      - name: Publish coverage summary to job summary
        if: always()
        run: |
          echo "## Frontend coverage" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => \`| \${m.pct.toFixed(2)}% | \${m.covered}/\${m.total} |\`;
              const out = [
                '| Metric | Coverage | Covered/Total |',
                '|---|---|---|',
                \`| Lines      \${fmt(c.lines)}\`,
                \`| Statements \${fmt(c.statements)}\`,
                \`| Functions  \${fmt(c.functions)}\`,
                \`| Branches   \${fmt(c.branches)}\`,
              ].join('\n');
              require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, out + '\n');
            "
          fi

      - name: Upload frontend coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 30

      - name: Production build
        run: npm run build

  e2e:
    name: Frontend e2e (Playwright) [required]
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: demo1234
          MYSQL_DATABASE: staff_scheduler
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pdemo1234"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for MySQL service
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -pdemo1234 --silent; then
              echo "mysql up"; exit 0
            fi
            echo "waiting for mysql ($i)…"; sleep 2
          done
          echo "mysql did not become ready"; exit 1

      - name: Initialize database schema
        run: mysql -h 127.0.0.1 -uroot -pdemo1234 staff_scheduler < backend/database/init.sql

      - name: Seed demo data
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: demo1234
          DB_NAME: staff_scheduler
          JWT_SECRET: ci-secret-please-change
          NODE_ENV: development
        run: npm run db:seed:demo

      - name: Start backend
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: demo1234
          DB_NAME: staff_scheduler
          JWT_SECRET: ci-secret-please-change
          PORT: 3001
          NODE_ENV: development
        run: |
          nohup npm run dev > ../backend.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3001/api/health >/dev/null; then
              echo "backend up"; exit 0
            fi
            sleep 2
          done
          echo "backend failed to come up; tail of backend.log:"
          tail -200 ../backend.log
          exit 1

      - name: Run Playwright tests
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://127.0.0.1:3001/api
          E2E_BASE_URL: http://127.0.0.1:3000
          CI: 'true'
        run: npm run test:e2e

      - name: Dump backend log on failure
        if: failure()
        run: |
          echo '## Backend log (last 400 lines)' >> "$GITHUB_STEP_SUMMARY"
          tail -400 backend.log >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results
          retention-days: 14
          if-no-files-found: ignore
